{% extends "base.html" %}

{% block title %}Reporte de Ingresos{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center">
                <h2><i class="fas fa-chart-line"></i> Reporte de Ingresos</h2>
                <a href="{{ url_for('reportes.index') }}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Volver a reportes
                </a>
            </div>
        </div>
    </div>

    <form method="POST" action="{{ url_for('reportes.ingresos') }}">
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="fas fa-calendar-alt"></i> Seleccionar Rango de Fechas</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <div class="form-group">
                            <label for="fecha_inicio">Fecha Inicio *</label>
                            <input type="date" name="fecha_inicio" id="fecha_inicio" class="form-control" required>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label for="fecha_fin">Fecha Fin *</label>
                            <input type="date" name="fecha_fin" id="fecha_fin" class="form-control" required>
                        </div>
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary btn-block">
                            <i class="fas fa-search"></i> Generar Reporte
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </form>

    <div class="alert alert-info">
        <i class="fas fa-info-circle"></i> 
        Seleccione un rango de fechas para ver las órdenes entregadas y los ingresos totales en ese período.
    </div>
</div>
{% endblock %}
