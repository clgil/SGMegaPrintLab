{% extends "base.html" %}

{% block title %}{{ accion }} Contrato - Taller de Impresoras{% endblock %}

{% block content %}
<div class="container-fluid">
    <h1 class="mb-4">{{ '➕' if accion == 'Crear' else '✏️' }} {{ accion }} Contrato de Mantenimiento</h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <form method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Cliente *</label>
                        <select name="cliente_id" class="form-select" required>
                            <option value="">Seleccione...</option>
                            {% for cliente in clientes %}
                            <option value="{{ cliente.id }}" {% if contrato and contrato.cliente_id == cliente.id %}selected{% endif %}>
                                {{ cliente.nombre }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Frecuencia *</label>
                        <select name="frecuencia" class="form-select" required>
                            <option value="">Seleccione...</option>
                            {% for freq in frecuencias %}
                            <option value="{{ freq }}" {% if contrato and contrato.frecuencia == freq %}selected{% endif %}>
                                {{ freq|capitalize }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Fecha de Inicio *</label>
                        <input type="date" name="fecha_inicio" class="form-control" value="{{ contrato.fecha_inicio if contrato else '' }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Fecha de Fin (opcional)</label>
                        <input type="date" name="fecha_fin" class="form-control" value="{{ contrato.fecha_fin if contrato else '' }}">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea name="descripcion" class="form-control" rows="2">{{ contrato.descripcion if contrato else '' }}</textarea>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Precio Mantenimiento (CUP)</label>
                        <input type="number" step="0.01" name="precio_mantenimiento" class="form-control" value="{{ contrato.precio_mantenimiento if contrato else '0' }}">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Dispositivos Cubiertos</label>
                        <input type="number" name="dispositivos_cubiertos" class="form-control" value="{{ contrato.dispositivos_cubiertos if contrato else '1' }}" min="1">
                    </div>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('contratos.index') }}" class="btn btn-secondary">← Volver</a>
                    <button type="submit" class="btn btn-primary">{{ 'Guardar' if accion == 'Crear' else 'Actualizar' }}</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
