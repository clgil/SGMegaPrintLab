{% extends "base.html" %}

{% block title %}Iniciar Sesión - Taller de Impresoras{% endblock %}

{% block content_no_auth %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h3>🖨️ Taller de Impresoras</h3>
                <small>Sistema de Gestión</small>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control py-3" id="usuario" name="usuario" required autofocus placeholder="Usuario">
                        <label for="usuario">Usuario</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control py-3" id="password" name="password" required placeholder="Contraseña">
                        <label for="password">Contraseña</label>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg py-3" style="min-height: 48px;">Entrar</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-muted text-center">
                <small>¿Olvidó su contraseña? <a href="#">Contacte al administrador</a></small><br>
                <small>¿No tiene cuenta? <a href="{{ url_for('auth.registro') }}">Regístrese aquí</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
