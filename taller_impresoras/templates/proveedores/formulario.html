{% extends "base.html" %}

{% block title %}{{ accion }} Proveedor - Taller de Impresoras{% endblock %}

{% block content %}
<div class="container-fluid">
    <h1 class="mb-4">{{ '➕' if accion == 'Crear' else '✏️' }} {{ accion }} Proveedor</h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <form method="POST" novalidate>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nombre *</label>
                        <input type="text" name="nombre" class="form-control" value="{{ proveedor.nombre if proveedor else '' }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Persona de Contacto</label>
                        <input type="text" name="contacto" class="form-control" value="{{ proveedor.contacto if proveedor else '' }}">
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="text" name="telefono" class="form-control" value="{{ proveedor.telefono if proveedor else '' }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Tipo</label>
                        <select name="tipo" class="form-select">
                            <option value="informal" {% if proveedor and proveedor.tipo == 'informal' %}selected{% endif %}>Informal</option>
                            <option value="formal" {% if proveedor and proveedor.tipo == 'formal' %}selected{% endif %}>Formal</option>
                        </select>
                    </div>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('proveedores.index') }}" class="btn btn-secondary">← Volver</a>
                    <button type="submit" class="btn btn-primary">{{ 'Guardar' if accion == 'Crear' else 'Actualizar' }}</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
