{% extends "base.html" %}

{% block title %}Cambiar Contraseña{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">🔑 Cambiar Contraseña</h5>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('auth.cambiar_password') }}">
                        <div class="mb-3">
                            <label for="password_actual" class="form-label">Contraseña Actual *</label>
                            <input type="password" class="form-control" name="password_actual" id="password_actual" required>
                        </div>

                        <div class="mb-3">
                            <label for="password_nuevo" class="form-label">Nueva Contraseña *</label>
                            <input type="password" class="form-control" name="password_nuevo" id="password_nuevo" 
                                   minlength="4" required>
                            <small class="form-text text-muted">Mínimo 4 caracteres</small>
                        </div>

                        <div class="mb-3">
                            <label for="password_confirm" class="form-label">Confirmar Nueva Contraseña *</label>
                            <input type="password" class="form-control" name="password_confirm" id="password_confirm" 
                                   minlength="4" required>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">💾 Guardar Nueva Contraseña</button>
                            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
