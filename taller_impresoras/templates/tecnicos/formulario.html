{% extends "base.html" %}

{% block title %}{{ accion }} Técnico{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center">
                <h2><i class="fas fa-user-cog"></i> {{ accion }} Técnico</h2>
                <a href="{{ url_for('tecnicos.index') }}" class="btn btn-secondary py-3 d-block d-sm-inline-block w-100 w-sm-auto" style="min-height: 48px;">
                    <i class="fas fa-arrow-left"></i> Volver al listado
                </a>
            </div>
        </div>
    </div>

    <form method="POST" novalidate action="{% if tecnico %}{{ url_for('tecnicos.editar', id=tecnico.id) }}{% else %}{{ url_for('tecnicos.nuevo') }}{% endif %}">
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="fas fa-id-badge"></i> Datos del Técnico</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-12 col-md-6 mb-3">
                        <div class="form-floating">
                            <input type="text" name="nombre" id="nombre" class="form-control py-3" 
                                   value="{% if tecnico %}{{ tecnico.nombre }}{% endif %}" required placeholder="Nombre Completo">
                            <label for="nombre">Nombre Completo *</label>
                        </div>
                    </div>
                    <div class="col-12 col-md-6 mb-3">
                        <div class="form-floating">
                            <input type="text" name="especialidad" id="especialidad" class="form-control py-3" 
                                   value="{% if tecnico %}{{ tecnico.especialidad }}{% endif %}"
                                   placeholder="Ej: Impresoras Láser, Multifuncionales...">
                            <label for="especialidad">Especialidad</label>
                        </div>
                    </div>
                </div>
                
                {% if tecnico %}
                <div class="row mt-3">
                    <div class="col-12 col-md-6 mb-3">
                        <div class="form-check form-switch py-3">
                            <input type="checkbox" name="activo" id="activo" class="form-check-input" 
                                   value="1" {% if tecnico.activo %}checked{% endif %}>
                            <label class="form-check-label" for="activo">Activo</label>
                        </div>
                    </div>
                    <div class="col-12 col-md-6 mb-3">
                        <div class="form-floating">
                            <input type="text" class="form-control py-3" readonly value="{{ tecnico.ordenes|length }} órdenes">
                            <label>Órdenes Asignadas</label>
                        </div>
                    </div>
                </div>
                {% endif %}
            </div>
        </div>

        <div class="d-grid gap-2 d-md-flex justify-content-md-start">
            <button type="submit" class="btn btn-primary py-3 d-block d-sm-inline-block w-100 w-sm-auto" style="min-height: 48px;">
                <i class="fas fa-save"></i> {{ accion }} Técnico
            </button>
            <a href="{{ url_for('tecnicos.index') }}" class="btn btn-secondary py-3 d-block d-sm-inline-block w-100 w-sm-auto" style="min-height: 48px;">
                <i class="fas fa-times"></i> Cancelar
            </a>
        </div>
    </form>
</div>

<script>
// Validación del formulario
document.querySelector('form').addEventListener('submit', function(e) {
    const nombre = document.getElementById('nombre').value.trim();
    
    if (!nombre) {
        e.preventDefault();
        alert('El nombre del técnico es obligatorio');
        return false;
    }
});
</script>
{% endblock %}
